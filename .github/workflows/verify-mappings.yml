name: Mapping-bewaking

# Wekelijkse controle van de land→bron-koppelingen tegen de indexen van de
# bronnen zelf (VK/Duitsland/Canada/Ierland). Hernoemingen zoals gov.uk's
# czech-republic → czechia worden zo gemeld in plaats van maandenlang stil
# te falen. Rapport wordt gecommit; bij kapotte koppelingen komt er een
# issue met kant-en-klare suggesties.
on:
  schedule:
    - cron: '30 6 * * 1' # maandag 06:30 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: verify-mappings
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - name: Koppelingen valideren tegen bron-indexen
        run: node scripts/verify-mappings.mjs

      - name: Rapport committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mapping-health.json
          if ! git diff --cached --quiet; then
            git commit -m "Mapping-gezondheid $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      # Zelfherstel: hoge-zekerheid-suggesties (score >= 0.8, VK/Ierland)
      # worden toegepast, live geverifieerd en als kant-en-klare PR
      # aangeboden. Lage zekerheid of verificatie-falen -> alleen het issue.
      - name: Auto-fix proberen (hoge zekerheid, live geverifieerd)
        id: autofix
        working-directory: .
        run: |
          broken=$(node -e "console.log(require('./worker/data/mapping-health.json').totalBroken || 0)")
          if [ "$broken" = "0" ]; then echo "fixed=0" >> "$GITHUB_OUTPUT"; exit 0; fi
          node worker/scripts/apply-mapping-fixes.mjs | tee /tmp/fixlog.txt || true
          fixed=$(grep -c '^FIX ' /tmp/fixlog.txt || true)
          echo "fixed=$fixed" >> "$GITHUB_OUTPUT"

      - name: Contracttests na auto-fix
        if: steps.autofix.outputs.fixed != '0'
        run: node --test test/contract.test.mjs

      - name: Auto-fix-PR openen
        if: steps.autofix.outputs.fixed != '0'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="mapping-fix/$(date -u +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add server/data/slug-overrides.json server/data/countries.json worker/src/data/countries.json
          git commit -m "Auto-fix: kapotte bron-koppelingen hersteld (mapping-bewaking)"
          git push -u origin "$branch" --force
          if [ "$(gh pr list --head "$branch" --state open --json number --jq 'length')" = "0" ]; then
            {
              echo "De wekelijkse mapping-bewaking vond kapotte koppelingen en heeft de hoge-zekerheid-fixes automatisch toegepast. Elke fix is live geverifieerd (advies opgehaald, >= 3 secties) en de contracttests zijn groen."
              echo
              echo '```'
              cat /tmp/fixlog.txt
              echo '```'
              echo
              echo "Na de merge rapporteert de eerstvolgende wekelijkse controle deze koppelingen als hersteld."
            } > /tmp/prbody.md
            gh pr create --base main --head "$branch" --title "Auto-fix: kapotte bron-koppelingen hersteld" --body-file /tmp/prbody.md
          fi
          git checkout main

      - name: Issue openen bij kapotte koppelingen
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          broken=$(node -e "console.log(require('./worker/data/mapping-health.json').totalBroken || 0)")
          fixed="${{ steps.autofix.outputs.fixed }}"
          echo "Kapotte koppelingen: $broken (waarvan $fixed auto-gefixt in een PR)"
          [ "$broken" = "0" ] && exit 0
          [ "$broken" = "$fixed" ] && exit 0
          title="Mapping-check: $broken kapotte bron-koppeling(en)"
          existing=$(gh issue list --state open --search "Mapping-check in:title" --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            body=$(node -e "
              const r = require('./worker/data/mapping-health.json');
              const lines = ['De wekelijkse mapping-controle vond kapotte koppelingen (bron heeft waarschijnlijk paginanamen gewijzigd):', ''];
              for (const [sid, s] of Object.entries(r.sources)) {
                for (const b of s.broken || []) lines.push('- **' + sid + '** ' + b.iso3 + ' (' + b.land + '): \`' + b.id + '\`' + (b.suggestie ? ' → suggestie: \`' + b.suggestie + '\`' : ''));
              }
              lines.push('', 'Verwerk de suggesties als overrides in server/scripts/build-countries.js en draai \`npm run build:countries\`.');
              console.log(lines.join('\n'));
            ")
            gh issue create --title "$title" --body "$body"
          fi
