name: CH crisis-snapshot (EDA)

# Herstelt Zwitserland: het crisis-portaal serveert alle landen in één pagina
# (per-land EDA-pagina's blokkeren datacenter-IP's, dit portaal niet). Een
# echte Chromium rendert de pagina, parst de standaardformules per land en
# schrijft het als vangnet naar worker/data/latest/{ISO3}.json onder 'ch' —
# dezelfde snapshot die de Worker al serveert.
#
# Dagelijks om 02:00 Europe/Amsterdam + handmatig; bij wijziging van
# script/classifier een proefrun. GitHub-cron kent alleen UTC en geen
# zomertijd, dus we plannen 00:00 én 01:00 UTC en laten een guard-job enkel
# de run doorgaan waarvan de lokale klok écht 02:00 in Amsterdam is.
on:
  schedule:
    - cron: '0 0 * * *' # 02:00 Amsterdam tijdens zomertijd (CEST = UTC+2)
    - cron: '0 1 * * *' # 02:00 Amsterdam tijdens wintertijd (CET  = UTC+1)
  workflow_dispatch:
    inputs:
      countries:
        description: 'Alleen deze ISO3-codes (komma-gescheiden), leeg = alle'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - '.github/workflows/ch-crisis.yml'
      - 'worker/scripts/ch-crisis-snapshot.mjs'
      - 'worker/src/analysis/ch-classify.js'

permissions:
  contents: write

concurrency:
  group: ch-crisis
  cancel-in-progress: false

jobs:
  # DST-proof tijdvenster: alleen doorgaan als het in Amsterdam 02:00 is (of
  # bij een handmatige/push-run), zodat de geplande run precies één keer per
  # dag om 02:00 lokale tijd vuurt ondanks de twee UTC-cronregels.
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ='Europe/Amsterdam' date +%H)" = "02" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Lokale tijd is $(TZ='Europe/Amsterdam' date '+%H:%M %Z') — niet 02:00, run overslaan."
          fi

  snapshot:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Dependencies installeren
        run: npm ci
      - name: Playwright Chromium installeren
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: CH crisis-snapshot maken
        run: node scripts/ch-crisis-snapshot.mjs
        env:
          COUNTRIES: ${{ inputs.countries }}
      - name: Wijzigingen committen
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest
          if ! git diff --cached --quiet; then
            git commit -m "CH crisis-snapshot $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
