name: Kaart-ontdekking PROEF (wegwerp)

# Diagnose: welke bronnen publiceren per land een gekleurde risicokaart waar
# de pixel-methode op toepasbaar is? Rendert per bron × testland de pagina en
# rapporteert de kleurverdeling van de grootste afbeelding. Schrijft niets.
# Wordt vóór de merge verwijderd.
on:
  workflow_dispatch:
  push:
    branches: [claude/travel-advisory-comparison-3oipdz]
    paths:
      - '.github/workflows/map-discovery.yml'
      - 'worker/scripts/map-discovery.mjs'

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Dependencies installeren
        run: npm ci
      - name: Playwright Chromium installeren
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Kaart-ontdekking draaien
        run: node scripts/map-discovery.mjs
