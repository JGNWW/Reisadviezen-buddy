name: Kaart-kleuren PROEF (wegwerp)

# Tijdelijke validatie van ca/at (nieuw) + fr/uk (regressie) op de
# feature-branch, ZONDER naar main te committen. Wordt vóór de merge verwijderd.
on:
  push:
    branches: [claude/travel-advisory-comparison-3oipdz]
    paths:
      - '.github/workflows/map-colors-trial.yml'
      - 'worker/scripts/map-colors.mjs'
      - 'worker/src/adapters/austria.js'

permissions:
  contents: read

jobs:
  trial:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Dependencies installeren
        run: npm ci
      - name: Playwright Chromium installeren
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Proef-bemonstering ca/at/fr/uk met diagnose
        run: node scripts/map-colors.mjs
        env:
          COUNTRIES: AFG,UKR,IRQ,THA,JPN,DEU,LBN,COL
          SOURCES: ca,at,fr,uk
          DIAG: '1'
      - name: Resultaat uploaden
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: map-colors-trial
          path: worker/data/mapcolors/
          if-no-files-found: warn
