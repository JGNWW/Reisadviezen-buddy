name: Browser-snapshots (DK/NO/CH)

# Bronnen die serverside niet op te halen zijn (um.dk = React-SPA met
# vergrendelde API; regjeringen.no = Cloudflare-botcheck; eda.admin.ch =
# datacenter-blokkade) worden hier met een echte headless Chromium gerenderd
# en als vangnet naar worker/data/latest/ geschreven — de Worker serveert die
# snapshots wanneer live ophalen faalt of niets oplevert.
#
# Dagelijks om 02:00 Europe/Amsterdam + handmatig met een optionele landenlijst
# voor gerichte verversing. GitHub-cron kent alleen UTC en geen zomertijd, dus
# we plannen zowel 00:00 als 01:00 UTC en laten een guard-job (hieronder) enkel
# de run doorgaan waarvan de lokale klok écht 02:00 in Amsterdam is — zo klopt
# het tijdstip het hele jaar, ongeacht zomer-/wintertijd.
on:
  schedule:
    - cron: '0 0 * * *' # 02:00 Amsterdam tijdens zomertijd (CEST = UTC+2)
    - cron: '0 1 * * *' # 02:00 Amsterdam tijdens wintertijd (CET  = UTC+1)
  workflow_dispatch:
    inputs:
      countries:
        description: 'Alleen deze ISO3-codes (komma-gescheiden), leeg = alle'
        required: false
        default: ''
  # Bij wijziging van script/workflow zelf: een beperkte proefrun (Golfstaten)
  # zodat elke aanpassing meteen end-to-end gevalideerd is.
  push:
    branches: [main]
    paths:
      - '.github/workflows/browser-snapshot.yml'
      - 'worker/scripts/browser-snapshot.mjs'

permissions:
  contents: write

concurrency:
  group: browser-snapshot
  cancel-in-progress: false

jobs:
  # DST-proof tijdvenster: alleen doorgaan als het in Amsterdam 02:00 is
  # (of bij een handmatige/push-run). Zo vuurt de geplande run precies
  # één keer per dag om 02:00 lokale tijd, ondanks de twee UTC-cronregels.
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ='Europe/Amsterdam' date +%H)" = "02" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Lokale tijd is $(TZ='Europe/Amsterdam' date '+%H:%M %Z') — niet 02:00, run overslaan."
          fi

  capture:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Dependencies installeren
        run: npm ci

      # --no-save: playwright alleen in déze job — de andere workflows
      # (tests, 6-uurs-snapshot) blijven licht en ongewijzigd.
      - name: Playwright Chromium installeren
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Browser-snapshots maken
        run: node scripts/browser-snapshot.mjs
        env:
          # dispatch: gekozen lijst · push (proefrun): Golfstaten · cron: alles
          COUNTRIES: ${{ github.event_name == 'push' && 'BHR,IRQ,JOR,KWT,OMN,QAT,SAU,ARE' || inputs.countries }}

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest
          if ! git diff --cached --quiet; then
            git commit -m "Browser-snapshots DK/NO/CH $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
