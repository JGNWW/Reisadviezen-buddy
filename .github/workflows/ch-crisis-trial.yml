name: CH crisis PROEF (wegwerp)

# Validatie van de CH-classifier op een set landen (met diagnose), ZONDER naar
# main te committen. Wordt vóór de merge verwijderd.
on:
  push:
    branches: [claude/travel-advisory-comparison-3oipdz]
    paths:
      - '.github/workflows/ch-crisis-trial.yml'
      - 'worker/scripts/ch-crisis-snapshot.mjs'
      - 'worker/src/analysis/ch-classify.js'

permissions:
  contents: read

jobs:
  trial:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Dependencies installeren
        run: npm ci
      - name: Playwright Chromium installeren
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: CH-classificatie valideren (diagnose)
        run: node scripts/ch-crisis-snapshot.mjs
        env:
          COUNTRIES: AFG,UKR,IRQ,RUS,SYR,THA,EGY,COL,LBN,ISR,JPN,DEU,NLD,ESP,ITA,CHE,BRA
          DIAG: '1'
