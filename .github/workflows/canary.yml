name: Live-canary bron-adapters

# Wekelijkse controle of elke bron-adapter nog werkt op de échte site
# (de offline contracttests bewaken alleen de parseerlogica). Bij falen
# wordt automatisch een issue geopend (met dedupe op titel).
on:
  schedule:
    - cron: '0 7 * * 1' # maandag 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - name: Canary draaien (2 landen per bron, live)
        run: node scripts/canary.mjs
        env:
          JINA_KEY: ${{ secrets.JINA_KEY }}
          CORS_PROXY_URL: ${{ secrets.CORS_PROXY_URL }}

      - name: Issue openen bij falen
        if: failure()
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Canary: bron-adapter(s) falen op live data"
          existing=$(gh issue list --state open --search "\"$title\" in:title" --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            body=$(printf '%s\n\n%s\n\n%s' \
              "De wekelijkse live-canary is gefaald: minstens een bron-adapter levert geen geldig advies meer op live data. Waarschijnlijk heeft de bronsite zijn HTML of URL's verbouwd." \
              "Zie de log: $url" \
              "Stappenplan: haal verse fixtures op (worker/test/fixtures/), draai de contracttests, en pas de betreffende adapter in worker/src/adapters/ aan.")
            gh issue create --title "$title" --body "$body"
          fi
