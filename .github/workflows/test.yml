name: Tests

# Draait bij elke push/PR: de unit-tests van de NL-logica én de offline
# contracttests van de bron-adapters (tegen vaste fixtures — deterministisch,
# geen netwerk nodig).
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit-tests (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  contract:
    name: Adapter-contracttests (worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: node --test test/analysis.test.mjs test/contract.test.mjs test/coverage.test.mjs test/news.test.mjs test/xlsx.test.mjs
