name: FR-kaart proef (diagnostisch)

# Wegwerp-diagnose: kan de kleur van het Franse reisadvies uit de zonekaart
# afgeleid worden (kaartenmaker-idee)? Rendert de securite-pagina met een
# echte Chromium en rapporteert per testland welk kaart-element rendert +
# de zone-kleuren, met screenshots als artifact. Schrijft NIETS naar data/.
on:
  workflow_dispatch:
  push:
    branches: [claude/travel-advisory-comparison-3oipdz]
    paths:
      - '.github/workflows/fr-map-probe.yml'
      - 'worker/scripts/fr-map-probe.mjs'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Dependencies installeren
        run: npm ci

      - name: Playwright Chromium installeren
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: FR-kaart proef draaien
        run: node scripts/fr-map-probe.mjs

      - name: Screenshots + report uploaden
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fr-map-probe
          path: worker/fr-probe-out/
          if-no-files-found: warn
