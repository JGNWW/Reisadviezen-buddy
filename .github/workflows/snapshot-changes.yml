name: Snapshot buitenlandse reisadviezen

# Houdt bij welke landen een wijziging kregen bij de buitenlandse bronnen
# (VK/VS/Canada/Ierland/Frankrijk/Australië/Spanje) en wat die wijziging
# inhield. Gaat NIET over de Nederlandse reisadviezen (die worden door
# NederlandWereldwijd zelf bijgehouden en bij elke Pages-build al vers
# opgehaald) — alleen over de buitenlandse bronnen, die anders geen
# geschiedenis hebben omdat ze alleen live (per bezoek) opgevraagd worden.
on:
  schedule:
    # Elke 6 uur, zodat "recente wijzigingen" ook binnen de dag ververst;
    # de datacommit naar main triggert automatisch een Pages-rebuild.
    - cron: '30 5,11,17,23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot-foreign
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      # Altijd expliciet op main werken: geplande runs draaien op de
      # default branch van de repo, en die hoeft niet main te zijn —
      # zonder deze ref belandden de datacommits op een feature branch,
      # onzichtbaar voor de site (die vanaf main bouwt).
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Dependencies installeren
        run: npm ci

      # De per-land termenlijsten van de trefwoordindex zijn te groot voor
      # git-churn (±10 MB per run); ze reizen tussen runs mee via de
      # Actions-cache. Een cache-miss is onschuldig: de index wordt die run
      # opnieuw opgebouwd uit de gelukte ophalingen.
      - name: Trefwoordindex-cache herstellen
        uses: actions/cache@v4
        with:
          path: worker/data/foreign-index/docs.json
          key: foreign-index-docs-${{ github.run_id }}
          restore-keys: |
            foreign-index-docs-

      - name: Snapshot ophalen en wijzigingen bepalen
        run: node scripts/snapshot-foreign.mjs
        env:
          # Optioneel: alleen actief als deze repository-secrets bestaan.
          JINA_KEY: ${{ secrets.JINA_KEY }}
          CORS_PROXY_URL: ${{ secrets.CORS_PROXY_URL }}

      - name: Wijzigingen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Alles onder data/: history, fingerprints (nodig voor de
          # inhoudsvergelijking van morgen!), recent-changes en source-dates.
          git add data
          if ! git diff --cached --quiet; then
            git commit -m "Snapshot buitenlandse reisadviezen $(date -u +%Y-%m-%dT%H:%M)"
            # Main kan tijdens de run opgeschoven zijn; rebase en push dan alsnog.
            git pull --rebase origin main
            git push origin HEAD:main
          fi
