# Cloudflare Worker: live proxy voor buitenlandse reisadviezen + kaarten.
# Deploy:  cd worker && npm install && npx wrangler deploy
# Lokaal:  cd worker && npx wrangler dev
name = "reisadviezen-buddy-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Na deploy krijg je een URL zoals
#   https://reisadviezen-buddy-proxy.<jouw-subdomein>.workers.dev
# Zet die URL in de frontend (zie public/config.js of ?proxy=... parameter).
#
# Optioneel: Australië (Smartraveller) blokkeert datacenter-IP's, dus die bron
# wordt via de publieke reader-proxy r.jina.ai opgehaald. Voor hogere limieten/
# betrouwbaarheid kun je een gratis jina.ai-key als secret zetten:
#   npx wrangler secret put JINA_KEY
# Zonder key werkt het ook, maar kan de reader af en toe rate-limiten.
#
# Optioneel: een generieke fallback-proxy voor als een directe fetch faalt
# (bijv. als een bron ooit Cloudflare-IP's gaat blokkeren). Zet je eigen
# CORS-proxy als secret; de waarde komt nooit in de broncode terecht:
#   npx wrangler secret put CORS_PROXY_URL
# Zonder deze secret werkt alles gewoon door met alleen de directe fetch.
#
# Optioneel: vertaalbackend. Standaard vertaalt de Worker via het gratis
# (niet-officiële) Google-endpoint — geen key nodig, maar het rate-limit't
# onder druk. Voor betere/betrouwbaardere vertaling kies je een backend via
# een secret (voorrang: DeepL > LibreTranslate > Google):
#   npx wrangler secret put DEEPL_KEY          # DeepL (gratis tier: 500k tekens/mnd) — aanbevolen
#   npx wrangler secret put LIBRETRANSLATE_URL # zelf-gehoste LibreTranslate (bijv. https://vertaal.mijndomein.nl)
#   npx wrangler secret put LIBRETRANSLATE_KEY # optioneel, als jouw LibreTranslate een key eist
# Zet je niets, dan blijft Google de standaard. Zelfde secretnamen gelden ook
# als GitHub-repo-secret voor de snapshot-CI (die vertaalt de wijzigingsfeed).
